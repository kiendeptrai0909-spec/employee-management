spring.application.name=employeesystem

# Database — set via env (SPRING_DATASOURCE_* or DATABASE_*); no secrets in repo
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/employeesystem}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT (set JWT_SECRET in production; min 32 chars for HS-256)
app.jwt.secret=${JWT_SECRET:change-me-dev-only-min-32-char-secret-key!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,https://*.vercel.app}}

# Server
server.address=0.0.0.0
server.port=${PORT:8080}
